<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>LoanIQ — Loan Portfolio Copilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1220;
  --panel:#111B2E;
  --panel-2:#0E1728;
  --border:#1F2C46;
  --text:#E7ECF6;
  --text-muted:#8C99B8;
  --accent:#33D9C6;       /* sense / core teal */
  --accent-dim:#1B6D65;
  --predictive:#7C9BFF;   /* predictive violet-blue */
  --generative:#F5A623;   /* generative amber */
  --agentic:#EF6C5C;      /* agentic coral */
  --risk-high:#EF6C5C;
  --risk-medium:#F5A623;
  --risk-low:#33D9C6;
  --radius:10px;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(1200px 500px at 15% -10%, rgba(51,217,198,0.07), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(124,155,255,0.06), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  display:flex;
  flex-direction:column;
}
::selection{background:var(--accent-dim);color:#fff;}

/* ---------------- header ---------------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(17,27,46,0.9), rgba(17,27,46,0.6));
  backdrop-filter:blur(6px);
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:conic-gradient(from 220deg, var(--accent), var(--predictive), var(--generative), var(--agentic), var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;color:#0B1220;font-size:15px;
}
.brand-name{font-family:var(--font-display);font-weight:700;font-size:17px;letter-spacing:0.2px;}
.brand-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px;}
.cap-legend{display:flex;gap:14px;font-size:11.5px;color:var(--text-muted);}
.cap-legend span{display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* ---------------- layout ---------------- */
.layout{
  flex:1;display:flex;min-height:0;
  height:calc(100vh - 63px);
}
.sidebar{
  width:250px;flex-shrink:0;border-right:1px solid var(--border);
  padding:16px 14px;overflow-y:auto;background:rgba(14,23,40,0.4);
}
.sidebar h4{
  font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.2px;
  color:var(--text-muted);text-transform:uppercase;margin:18px 0 8px;
}
.sidebar h4:first-child{margin-top:0;}
.chip{
  display:block;width:100%;text-align:left;
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  padding:8px 10px;border-radius:8px;font-size:12.5px;margin-bottom:6px;
  cursor:pointer;transition:.15s;font-family:var(--font-body);
}
.chip:hover{border-color:var(--accent);background:#0F2A26;transform:translateY(-1px);}
.stat-mini{
  display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);
  padding:6px 2px;border-bottom:1px dashed var(--border);
}
.stat-mini b{color:var(--text);font-family:var(--font-mono);font-weight:500;}

/* ---------------- chat ---------------- */
.chat-col{flex:1;display:flex;flex-direction:column;min-width:0;}
.messages{flex:1;overflow-y:auto;padding:22px 26px;display:flex;flex-direction:column;gap:16px;}
.msg{max-width:760px;}
.msg.user{align-self:flex-end;}
.msg.bot{align-self:flex-start;}
.msg-bubble{
  border-radius:12px;padding:13px 16px;font-size:14px;line-height:1.55;
}
.msg.user .msg-bubble{background:#182238;border:1px solid var(--border);border-bottom-right-radius:3px;}
.msg.bot .msg-bubble{background:var(--panel);border:1px solid var(--border);border-bottom-left-radius:3px;}
.msg-bubble p{margin:0 0 8px;}
.msg-bubble p:last-child{margin-bottom:0;}
.msg-bubble .note{color:var(--text-muted);font-size:12px;font-style:italic;}
.cap-tag{
  display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);
  font-size:10px;letter-spacing:0.8px;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;margin-bottom:8px;font-weight:500;
}
.cap-tag.sense{background:rgba(51,217,198,0.12);color:var(--accent);border:1px solid rgba(51,217,198,0.3);}
.cap-tag.predictive{background:rgba(124,155,255,0.12);color:var(--predictive);border:1px solid rgba(124,155,255,0.3);}
.cap-tag.generative{background:rgba(245,166,35,0.12);color:var(--generative);border:1px solid rgba(245,166,35,0.3);}
.cap-tag.agentic{background:rgba(239,108,92,0.12);color:var(--agentic);border:1px solid rgba(239,108,92,0.3);}

/* data viz inside messages */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:8px;margin:10px 0;}
.stat-card{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;}
.stat-val{font-family:var(--font-mono);font-size:15px;font-weight:500;color:var(--text);}
.stat-lbl{font-size:10.5px;color:var(--text-muted);margin-top:2px;}
.bars{display:flex;flex-direction:column;gap:7px;margin:8px 0;}
.bar-row{display:grid;grid-template-columns:110px 1fr auto;align-items:center;gap:8px;font-size:12px;}
.bar-label{color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{background:var(--panel-2);border-radius:4px;height:8px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));border-radius:4px;}
.bar-val{font-family:var(--font-mono);white-space:nowrap;font-size:11.5px;}
.bar-pct{color:var(--text-muted);}
.tbl-wrap{overflow-x:auto;margin:8px 0;border:1px solid var(--border);border-radius:8px;}
.tbl{border-collapse:collapse;width:100%;font-size:12px;}
.tbl th{
  text-align:left;background:var(--panel-2);color:var(--text-muted);
  font-family:var(--font-mono);font-weight:500;font-size:10.5px;text-transform:uppercase;
  letter-spacing:0.5px;padding:8px 10px;position:sticky;top:0;
}
.tbl td{padding:7px 10px;border-top:1px solid var(--border);font-family:var(--font-mono);white-space:nowrap;}
.tbl tr:hover td{background:rgba(255,255,255,0.02);}
.flag-high{color:var(--risk-high);font-weight:600;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--font-mono);margin-right:4px;}
.badge-high{background:rgba(239,108,92,0.15);color:var(--risk-high);}
.badge-medium{background:rgba(245,166,35,0.15);color:var(--risk-medium);}
.badge-low{background:rgba(51,217,198,0.15);color:var(--risk-low);}
.badge-neutral{background:rgba(140,153,184,0.15);color:var(--text-muted);}
.rule{border:none;border-top:1px dashed var(--border);margin:12px 0;}

/* typing indicator */
.typing{display:flex;gap:4px;padding:4px 0;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}

/* input bar */
.input-bar{
  border-top:1px solid var(--border);padding:14px 26px 18px;
  background:linear-gradient(0deg, rgba(11,18,32,1), rgba(11,18,32,0.4));
}
.input-row{
  display:flex;gap:10px;align-items:center;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:6px 6px 6px 14px;max-width:900px;margin:0 auto;
}
.input-row input{
  flex:1;background:transparent;border:none;outline:none;color:var(--text);
  font-family:var(--font-body);font-size:14px;padding:8px 0;
}
.input-row input::placeholder{color:var(--text-muted);}
.send-btn{
  background:var(--accent);color:#062420;border:none;border-radius:8px;
  padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:var(--font-body);
  transition:.15s;
}
.send-btn:hover{filter:brightness(1.08);}
.send-btn:active{transform:scale(.97);}
.input-hint{max-width:900px;margin:8px auto 0;font-size:11px;color:var(--text-muted);text-align:center;}

/* scrollbars */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

@media (max-width:760px){
  .sidebar{display:none;}
  .messages{padding:16px;}
  .input-bar{padding:12px 14px 16px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">LQ</div>
    <div>
      <div class="brand-name">LoanIQ ChatBot</div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <h4>Quick Queries</h4>
    <!-- <button class="quick-query,chip",>How many loans in West region?</button> -->
    <button class="chip" data-q="Show breakdown by risk band">Risk band breakdown</button>
    <button class="chip" data-q="Why are loans rejected?">Why are loans rejected?</button>
    <button class="chip" data-q="Predict approval chance for high risk cases">Predict approval chance (high risk)</button>
    <button class="chip" data-q="Forecast the loan volume trend">Forecast loan volume trend</button>
    <button class="chip" data-q="Summarize the portfolio for South region">Summarize South region portfolio</button>
    <button class="chip" data-q="List pending cases">List pending cases</button>
    <button class="chip" data-q="Highlight high risk accounts">Highlight high-risk accounts</button>
    <button class="chip" data-q="Generate full report">Generate full portfolio report</button>
    <button class="chip" data-q="LN26100000">Look up case LN26100000</button>

    <h4>Portfolio Snapshot</h4>
    <div id="snapshot"></div>
  </div>

  <div class="chat-col">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <div class="input-row">
        <input id="input" type="text" placeholder="Ask about loan cases, risk, trends, or reports…" autocomplete="off"/>
        <button class="send-btn" id="send">Send</button>
      </div>
      <div class="input-hint">Try: "average FOIR for rejected self employed loans" · "next action for LN26100005" · "generate full report"</div>
    </div>
  </div>
</div>
<script>
    // ===============================
// LoanIQ Copilot
// script.js
// ===============================

const API = "https://loaniq-chatbot.onrender.com";

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const snapshot = document.getElementById("snapshot");

// ===============================
// Add User Message
// ===============================

function addUserMessage(text) {

    messages.innerHTML += `
        <div class="msg user">
            <div class="msg-bubble">
                ${text}
            </div>
        </div>
    `;

    scrollBottom();

}

// ===============================
// Add Bot Message
// ===============================

function addBotMessage(text) {

    messages.innerHTML += `
        <div class="msg bot">
            <div class="msg-bubble">
                ${text}
            </div>
        </div>
    `;

    scrollBottom();

}

// ===============================
// Typing Animation
// ===============================

function showTyping() {

    messages.innerHTML += `
        <div class="msg bot" id="typing">
            <div class="msg-bubble">
                Thinking...
            </div>
        </div>
    `;

    scrollBottom();

}

function hideTyping() {

    const typing = document.getElementById("typing");

    if (typing) {

        typing.remove();

    }

}

// ===============================
// Auto Scroll
// ===============================

function scrollBottom() {

    messages.scrollTop = messages.scrollHeight;

}

// ===============================
// Send Message
// ===============================

async function sendMessage(message) {

    if (!message.trim()) return;

    addUserMessage(message);

    input.value = "";

    showTyping();

    try {

        const response = await fetch(`${API}/chat/`, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                message: message
            })

        });

        const data = await response.json();

        hideTyping();

        addBotMessage(data.answer);

    }

    catch (error) {

        hideTyping();

        addBotMessage("Unable to connect to backend.");

        console.error(error);

    }

}

// ===============================
// Load Dashboard Snapshot
// ===============================

async function loadSnapshot() {

    try {

        const response = await fetch(`${API}/analytics/summary`);

        const data = await response.json();

        snapshot.innerHTML = `

            <div class="stat-mini">
                <span>Total Cases</span>
                <b>${data.TotalCases}</b>
            </div>

            <div class="stat-mini">
                <span>Approved</span>
                <b>${data.ApprovedCases}</b>
            </div>

            <div class="stat-mini">
                <span>Rejected</span>
                <b>${data.RejectedCases}</b>
            </div>

            <div class="stat-mini">
                <span>High Risk</span>
                <b>${data.HighRiskCases}</b>
            </div>

            <div class="stat-mini">
                <span>Average Loan</span>
                <b>₹${Number(data.AverageLoanAmount).toLocaleString()}</b>
            </div>

        `;

    }

    catch (error) {

        console.error(error);

    }

}

// ===============================
// Prediction API
// ===============================

async function predictLoan(formData) {

    try {

        const response = await fetch(`${API}/predict`, {

            method: "POST",

            headers: {

                "Content-Type": "application/json"

            },

            body: JSON.stringify(formData)

        });

        const data = await response.json();

        return data.prediction;

    }

    catch (error) {

        console.error(error);

        return null;

    }

}

// ===============================
// Send Button
// ===============================

sendBtn.addEventListener("click", () => {

    sendMessage(input.value);

});

// ===============================
// Enter Key
// ===============================

input.addEventListener("keypress", function (e) {

    if (e.key === "Enter") {

        sendMessage(input.value);

    }

});

// ===============================
// Quick Query Buttons
// ===============================

document.querySelectorAll(".quick-query").forEach(button => {

    button.addEventListener("click", () => {

        sendMessage(button.innerText);

    });

});

document.querySelectorAll(".chip").forEach(button => {

    button.addEventListener("click", () => {

        sendMessage(button.dataset.q);

    });

});

// ===============================
// Welcome Message
// ===============================

window.onload = function () {

    loadSnapshot();

    addBotMessage(`
         <b>Welcome to LoanIQ Copilot</b><br><br>

        I can help you with:
        <br><br>

        • Portfolio Summary
        <br>
        • Loan Analytics
        <br>
        • Risk Analysis
        <br>
        • AI Recommendations
        <br>
        • Loan Prediction
        <br>
        • Report Generation
        <br><br>

        Ask me anything about your loan portfolio.
    `);

};
</script>
</body>
</html>
